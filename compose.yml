services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./src:/var/www/html:ro
      - ./nginx/full.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/magento.conf:/etc/nginx/magento.conf:ro
    depends_on:
      - php
    networks:
      - app-network

  php:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /var/www/html
    depends_on:
      - db
      - opensearch
    volumes:
      - ./src:/var/www/html
    networks:
      - app-network

  db:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: magento
      MYSQL_USER: magento
      MYSQL_PASSWORD: magento
    volumes:
      - db_data:/var/lib/mysql
      - ./my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - app-network

  opensearch:
    image: opensearchproject/opensearch:2.19.3
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=MagentoAdmin123!
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - os_data:/usr/share/opensearch/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
  os_data:
